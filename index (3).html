<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>URL Safety Checker</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 100px; }
    input { padding: 8px; width: 300px; }
    button { padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 5px; }
    button:hover { background: #0056b3; }
    a { display: block; margin-top: 20px; color:#007bff; text-decoration:none; }
  </style>
</head>
<body>
  <h1>🔍 URL Safety Checker</h1>
  <form method="POST">
    <input type="text" name="url" placeholder="Enter website URL" required>
    <button type="submit">Check</button>
  </form>
  <a href="/tips">💡 Safe Browsing Tips</a>
</body>
</html>
